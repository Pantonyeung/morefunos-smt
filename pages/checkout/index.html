<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>磨飯 SMT｜結帳</title>
  <link rel="stylesheet" href="../../shared/page-base.css?v=smt-t2s-1280x800-rebuild.35">
  <link rel="stylesheet" href="page.css?v=smt-t2s-1280x800-rebuild.35">
  <link rel="stylesheet" href="channel-payment.css?v=smt-t2s-1280x800-rebuild.35">
  <link rel="stylesheet" href="../../shared/t2s-fixed-canvas.css?v=smt-t2s-1280x800-rebuild.35">
  <style>
    body[data-page="checkout"] .app{width:1280px!important;height:800px!important;min-width:1280px!important;max-width:1280px!important;min-height:800px!important;max-height:800px!important;overflow:hidden!important;background:var(--bg)!important}
    body[data-page="checkout"] .topbar{height:58px!important;min-height:58px!important;padding:0 18px!important;gap:12px!important;flex:0 0 58px!important}
    body[data-page="checkout"] .brand{font-size:22px!important}
    body[data-page="checkout"] .status-item{font-size:12px!important}
    body[data-page="checkout"] .checkout{width:1280px!important;height:742px!important;min-width:1280px!important;max-width:1280px!important;min-height:742px!important;max-height:742px!important;display:grid!important;grid-template-columns:390px minmax(0,1fr)!important;gap:10px!important;padding:10px 12px!important;overflow:hidden!important;flex:0 0 742px!important}
    body[data-page="checkout"] .checkout-cart{height:722px!important;min-height:0!important;padding:10px!important;overflow:hidden!important;display:flex!important;flex-direction:column!important}
    body[data-page="checkout"] .checkout-cart>header{height:42px!important;min-height:42px!important;flex:0 0 42px!important}
    body[data-page="checkout"] .checkout-cart h2{font-size:20px!important;margin:0!important}
    body[data-page="checkout"] .cart-lines{flex:1 1 auto!important;min-height:0!important;overflow-y:auto!important;padding-right:2px!important}
    body[data-page="checkout"] .checkout-cart article{grid-template-columns:24px minmax(0,1fr) auto!important;gap:7px!important;padding:8px 0!important;min-height:50px!important}
    body[data-page="checkout"] .checkout-cart article strong{font-size:14px!important;line-height:1.25!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}
    body[data-page="checkout"] .checkout-cart article small{font-size:11px!important}
    body[data-page="checkout"] .detail-actions{height:58px!important;min-height:58px!important;gap:7px!important;padding-top:8px!important;flex:0 0 58px!important}
    body[data-page="checkout"] .detail-actions button{min-height:48px!important;border-radius:11px!important;padding:4px!important}
    body[data-page="checkout"] .checkout-main{height:722px!important;min-height:0!important;min-width:0!important;position:relative!important;padding:10px 10px 76px!important;gap:6px!important;display:flex!important;flex-direction:column!important;overflow:hidden!important}
    body[data-page="checkout"] .row{display:grid!important;gap:6px!important;flex:0 0 auto!important;min-width:0!important}
    body[data-page="checkout"] .row.channels{grid-template-columns:repeat(5,minmax(0,1fr))!important}
    body[data-page="checkout"] .row.payments{grid-template-columns:repeat(6,minmax(0,1fr))!important}
    body[data-page="checkout"] .checkout-main>.row button{min-width:0!important;min-height:42px!important;height:42px!important;padding:3px 4px!important;overflow:hidden!important;gap:2px!important;border-radius:999px!important}
    body[data-page="checkout"] .checkout-main>.row button span{max-width:100%!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;font-size:11px!important;line-height:1.1!important}
    body[data-page="checkout"] .option-icon{width:20px!important;height:20px!important;flex:0 0 20px!important}
    body[data-page="checkout"] .summary{display:grid!important;grid-template-columns:repeat(5,minmax(0,1fr))!important;gap:6px!important;height:54px!important;min-height:54px!important;flex:0 0 54px!important;overflow:hidden!important}
    body[data-page="checkout"] .summary>span,body[data-page="checkout"] .summary .received-summary{min-width:0!important;padding:6px 8px!important;gap:1px!important;border-radius:9px!important}
    body[data-page="checkout"] .summary b{font-size:18px!important;line-height:1.05!important}
    body[data-page="checkout"] .cash-controls{flex:1 1 auto!important;min-height:0!important;overflow:hidden!important;padding-bottom:0!important;display:block!important}
    body[data-page="checkout"] .keypad-wrap{height:100%!important;min-height:0!important;display:grid!important;grid-template-rows:36px minmax(0,1fr)!important;gap:6px!important;overflow:hidden!important}
    body[data-page="checkout"] .keypad-wrap .quick-amounts{display:grid!important;grid-template-columns:repeat(6,minmax(0,1fr))!important;gap:6px!important;min-width:0!important;min-height:0!important}
    body[data-page="checkout"] .quick-amounts button{min-width:0!important;min-height:36px!important;height:36px!important;border-radius:8px!important;padding:1px!important;font-size:12px!important}
    body[data-page="checkout"] .keypad-wrap .keypad{min-width:0!important;min-height:0!important;height:100%!important;display:grid!important;grid-template-columns:repeat(3,minmax(0,1fr))!important;grid-template-rows:repeat(4,minmax(44px,1fr))!important;gap:6px!important;overflow:hidden!important}
    body[data-page="checkout"] .keypad-wrap .keypad button{min-width:0!important;min-height:44px!important;height:auto!important;font-size:25px!important;border-radius:9px!important}
    body[data-page="checkout"] .checkout-context{flex:1 1 auto!important;min-height:0!important;height:auto!important;display:grid!important;place-content:center!important;overflow:hidden!important}
    body[data-page="checkout"] .channel-fields{flex:1 1 auto!important;min-height:0!important;overflow:auto!important;grid-template-columns:repeat(2,minmax(0,1fr))!important;padding:8px!important}
    body[data-page="checkout"] .checkout-action-zone{position:absolute!important;left:10px!important;right:10px!important;bottom:10px!important;z-index:8!important;margin:0!important;padding-top:7px!important;background:#fff!important;border-top:1px solid var(--line)!important;box-shadow:0 -8px 18px rgba(49,34,26,.07)!important}
    body[data-page="checkout"] .checkout-action-zone .confirm{width:100%!important;height:58px!important;min-height:58px!important;border-radius:11px!important;font-size:20px!important}
    body[data-page="checkout"] .zero-warning{margin:0 0 5px!important;padding:5px 8px!important;font-size:12px!important}
  </style>
</head>
<body data-page="checkout">
  <div id="app"></div>
  <script src="../../shared/page-bridge.js?v=smt-t2s-1280x800-rebuild.35"></script>
  <script type="module" src="page.js?v=smt-t2s-1280x800-rebuild.35"></script>
</body>
</html>
