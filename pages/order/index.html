<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover"
    />
    <title>磨飯 SMT｜點單 T2S 1280×800</title>
    <link rel="stylesheet" href="../../shared/page-base.css?v=smt-t2s-1280x800-rebuild.30" />
    <link rel="stylesheet" href="page.css?v=smt-t2s-1280x800-rebuild.30" />
    <link rel="stylesheet" href="t2s-1280.css?v=smt-t2s-1280x800-rebuild.30" />
    <style>
      .persistent-pairing-confirm {
        inset: auto 18px 76px auto !important;
        width: min(330px, calc(100% - 36px)) !important;
        padding: 10px 12px !important;
        gap: 6px !important;
        border-radius: 10px !important;
      }
      .persistent-pairing-confirm strong { font-size: 14px !important; line-height: 1.25 !important; }
      .persistent-pairing-confirm p { margin: 0 !important; font-size: 11px !important; line-height: 1.35 !important; }
      .persistent-pairing-confirm div { gap: 6px !important; }
      .persistent-pairing-confirm button { min-height: 34px !important; padding: 5px 10px !important; font-size: 11px !important; }

      /* 快捷飲品抽屜：補回少量高度，確保整張飲品卡完整顯示。 */
      .quick-drawer-panel {
        height: 138px !important;
        min-height: 138px !important;
        max-height: 138px !important;
      }
      .quick-drawer-panel > header {
        height: 28px !important;
        min-height: 28px !important;
        padding: 0 8px !important;
      }
      .quick-drawer-panel > header button { width: 24px !important; height: 24px !important; }
      .quick-drawer-panel > div {
        flex: 1 1 auto !important;
        height: 108px !important;
        min-height: 0 !important;
        padding: 4px 6px 7px !important;
        align-items: flex-start !important;
        align-content: flex-start !important;
      }
      .quick-drawer-panel .drink-choice-card {
        height: 96px !important;
        grid-template-rows: 17px 71px !important;
        padding: 2px 4px 4px !important;
      }
      .quick-drawer-panel .drink-choice-card .drink-choice-img { height: 71px !important; }

      /* 飲品微調窗：縮細外框，保留加減及甜度冰量可操作性。 */
      .modifier-card.is-anchored-popover {
        width: 164px !important;
        min-width: 164px !important;
        max-width: 164px !important;
        max-height: 146px !important;
        z-index: 1005 !important;
      }
      .modifier-card > header { min-height: 25px !important; padding: 3px 5px !important; }
      .modifier-card > header strong { font-size: 9px !important; }
      .modifier-card > header button { width: 19px !important; height: 19px !important; min-height: 19px !important; font-size: 8px !important; }
      .modifier-card > .drink-base-qty { margin: 2px 4px !important; padding: 2px 3px !important; min-height: 22px !important; font-size: 8px !important; }
      .modifier-card > .drink-base-qty > span:last-child { grid-template-columns: 17px 18px 17px !important; gap: 1px !important; }
      .modifier-card > .drink-base-qty button,
      .modifier-card .drink-group button {
        width: 17px !important;
        min-width: 17px !important;
        height: 17px !important;
        min-height: 17px !important;
        padding: 0 !important;
        font-size: 7px !important;
        line-height: 1 !important;
      }
      .modifier-card .group-summary { width: auto !important; min-width: 0 !important; padding: 0 3px !important; font-size: 7px !important; }
      .modifier-card .drink-group { margin: 1px 4px !important; padding: 2px !important; }
      .modifier-card .drink-group > header { min-height: 20px !important; padding: 1px 2px !important; }
      .modifier-card .adjustment-options { padding: 2px !important; gap: 1px !important; }
      .modifier-card .adjustment-options .option-chips { gap: 1px !important; }
      .modifier-card .adjustment-options .option-chips button {
        width: auto !important;
        min-width: 0 !important;
        min-height: 17px !important;
        height: 17px !important;
        padding: 1px 3px !important;
        font-size: 7px !important;
      }
      .modifier-card > .add-group { margin: 1px 4px !important; min-height: 18px !important; height: 18px !important; padding: 1px !important; font-size: 7px !important; }
      .modifier-card > .wide { margin: 1px 4px 4px !important; min-height: 20px !important; height: 20px !important; font-size: 7px !important; }

      /* 修正三角方向。 */
      .is-anchored-popover[data-pointer-side="top"]::before { top: -8px !important; bottom: auto !important; transform: translateX(-50%) rotate(45deg) !important; }
      .is-anchored-popover[data-pointer-side="bottom"]::before { top: auto !important; bottom: -8px !important; transform: translateX(-50%) rotate(225deg) !important; }
      .is-anchored-popover[data-pointer-side="left"]::before { left: -8px !important; right: auto !important; transform: translateY(-50%) rotate(-45deg) !important; }
      .is-anchored-popover[data-pointer-side="right"]::before { left: auto !important; right: -8px !important; transform: translateY(-50%) rotate(135deg) !important; }
      .modifier-card.is-anchored-popover::before { display: block !important; z-index: 6 !important; }

      /* 飲品子窗開啟期間保留及鎖定必選／補選母層。 */
      .completion-parent-underlay {
        position: fixed !important;
        z-index: 1001 !important;
        pointer-events: none !important;
        opacity: 0.98;
        overflow: hidden !important;
      }
      .completion-parent-underlay::before { display: none !important; }
      .completion-card.completion-position-locked {
        position: fixed !important;
        right: auto !important;
        bottom: auto !important;
        transform: none !important;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "./menu-api.js": "./menu-api.js?v=smt-t2s-1280x800-rebuild.30",
          "./combo-rules.js": "./combo-rules.js?v=smt-t2s-1280x800-rebuild.30",
          "../../shared/store.js": "../../shared/store.js?v=smt-t2s-1280x800-rebuild.30"
        }
      }
    </script>
  </head>
  <body data-page="order">
    <div id="app"></div>
    <script>
      (() => {
        const app = document.getElementById('app');
        const view = { productsTop: 0, categoryLeft: 0, cartTop: 0 };
        let restoreTimer = 0;
        let completionSnapshot = null;
        let reopeningCompletion = false;

        function remember() {
          const products = app.querySelector('.products');
          const categories = app.querySelector('.category-scroll');
          const cart = app.querySelector('.cart-list');
          if (products) view.productsTop = products.scrollTop;
          if (categories) view.categoryLeft = categories.scrollLeft;
          if (cart) view.cartTop = cart.scrollTop;
        }

        function restore({ resetProducts = false } = {}) {
          clearTimeout(restoreTimer);
          restoreTimer = setTimeout(() => {
            requestAnimationFrame(() => {
              const products = app.querySelector('.products');
              const categories = app.querySelector('.category-scroll');
              const cart = app.querySelector('.cart-list');
              if (products) products.scrollTop = resetProducts ? 0 : view.productsTop;
              if (categories) categories.scrollLeft = view.categoryLeft;
              if (cart) cart.scrollTop = view.cartTop;
            });
          }, 0);
        }

        function lockCompletionPanel(panel) {
          if (!panel || !completionSnapshot) return;
          panel.classList.add('completion-position-locked');
          Object.assign(panel.style, {
            left: completionSnapshot.left + 'px',
            top: completionSnapshot.top + 'px',
            width: completionSnapshot.width + 'px',
            height: completionSnapshot.height + 'px',
            right: 'auto',
            bottom: 'auto',
            transform: 'none'
          });
        }

        function captureCompletionParent(actionNode) {
          if (actionNode?.dataset.action !== 'completion-drink') return;
          const panel = actionNode.closest('.completion-card');
          if (!panel) return;
          if (!completionSnapshot) {
            const rect = panel.getBoundingClientRect();
            completionSnapshot = {
              html: panel.outerHTML,
              left: rect.left,
              top: rect.top,
              width: rect.width,
              height: rect.height,
              scrollTop: panel.scrollTop
            };
          }
          lockCompletionPanel(panel);
        }

        function restoreCompletionParent() {
          if (!completionSnapshot) return;
          const modifier = app.querySelector('.modifier-card');
          const liveCompletion = app.querySelector('.completion-card:not(.completion-parent-underlay)');
          let underlay = app.querySelector('.completion-parent-underlay');

          if (liveCompletion) lockCompletionPanel(liveCompletion);

          if (modifier && !underlay) {
            const host = document.createElement('div');
            host.innerHTML = completionSnapshot.html;
            underlay = host.firstElementChild;
            if (underlay) {
              underlay.classList.add('completion-parent-underlay');
              underlay.removeAttribute('data-pointer-side');
              underlay.querySelectorAll('[data-action]').forEach(node => {
                node.removeAttribute('data-action');
                node.setAttribute('tabindex', '-1');
                node.setAttribute('aria-hidden', 'true');
              });
              Object.assign(underlay.style, {
                left: completionSnapshot.left + 'px',
                top: completionSnapshot.top + 'px',
                width: completionSnapshot.width + 'px',
                height: completionSnapshot.height + 'px',
                right: 'auto',
                bottom: 'auto',
                transform: 'none'
              });
              underlay.scrollTop = completionSnapshot.scrollTop;
              app.appendChild(underlay);
            }
          }

          if (modifier) {
            modifier.style.zIndex = '1005';
            return;
          }

          if (!liveCompletion && !reopeningCompletion) {
            const opener = app.querySelector('[data-action="open-completion"]');
            if (opener) {
              reopeningCompletion = true;
              opener.click();
              setTimeout(() => {
                const reopened = app.querySelector('.completion-card:not(.completion-parent-underlay)');
                lockCompletionPanel(reopened);
                reopeningCompletion = false;
              }, 0);
            }
          }
        }

        app.addEventListener('scroll', event => {
          const target = event.target;
          if (target.matches?.('.products')) view.productsTop = target.scrollTop;
          else if (target.matches?.('.category-scroll')) view.categoryLeft = target.scrollLeft;
          else if (target.matches?.('.cart-list')) view.cartTop = target.scrollTop;
        }, true);

        app.addEventListener('pointerdown', event => {
          const actionNode = event.target.closest('[data-action]');
          const statusNode = event.target.closest('button, [role="button"], span, div');
          const statusText = statusNode?.textContent?.trim() || '';

          if (!actionNode && /^(接單中|已停止接單|接單至)/.test(statusText)) {
            statusNode.dataset.action = 'open-status';
            statusNode.setAttribute('role', 'button');
            statusNode.setAttribute('aria-label', '開啟接單設定');
          }

          if (actionNode?.dataset.action === 'dismiss-modal' && actionNode.closest('.completion-card')) {
            completionSnapshot = null;
            reopeningCompletion = false;
          }

          captureCompletionParent(actionNode);
          remember();
          const action = (actionNode || statusNode)?.dataset.action || '';
          restore({ resetProducts: action === 'category' });
        }, true);

        app.addEventListener('keydown', event => {
          if (event.key !== 'Enter' && event.key !== ' ') return;
          const statusNode = event.target.closest('[role="button"]');
          if (!statusNode) return;
          const statusText = statusNode.textContent?.trim() || '';
          if (!/^(接單中|已停止接單|接單至)/.test(statusText)) return;
          statusNode.dataset.action = 'open-status';
        }, true);

        const modalObserver = new MutationObserver(() => {
          requestAnimationFrame(restoreCompletionParent);
        });
        modalObserver.observe(app, { childList: true, subtree: true });
      })();
    </script>
    <script src="../../shared/vendor/qrcode.js?v=smt-t2s-1280x800-rebuild.30"></script>
    <script src="../../shared/page-bridge.js?v=smt-t2s-1280x800-rebuild.30"></script>
    <script type="module" src="page.js?v=smt-t2s-1280x800-rebuild.30"></script>
    <script type="module" src="cart-category.js?v=smt-t2s-1280x800-rebuild.30"></script>
  </body>
</html>
