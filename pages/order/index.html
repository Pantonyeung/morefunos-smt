    <div id="app"></div>
    <script>
      (()=>{
        const app=document.getElementById('app');
        const view={productsTop:0,categoryLeft:0,cartTop:0};
        let restoreTimer=0,underlay=null,sourceRect=null,openingDrink=false;
        function remember(){const products=app.querySelector('.products'),categories=app.querySelector('.category-scroll'),cart=app.querySelector('.cart-list');if(products)view.productsTop=products.scrollTop;if(categories)view.categoryLeft=categories.scrollLeft;if(cart)view.cartTop=cart.scrollTop}
        function restore({resetProducts=false}={}){clearTimeout(restoreTimer);restoreTimer=setTimeout(()=>requestAnimationFrame(()=>{const products=app.querySelector('.products'),categories=app.querySelector('.category-scroll'),cart=app.querySelector('.cart-list');if(products)products.scrollTop=resetProducts?0:view.productsTop;if(categories)categories.scrollLeft=view.categoryLeft;if(cart)cart.scrollTop=view.cartTop}),0)}
        function clearDrinkLayer(){underlay?.remove();underlay=null;sourceRect=null;openingDrink=false}
        function captureDrinkLayer(actionNode){if(actionNode?.dataset.action!=='completion-drink')return;const panel=actionNode.closest('.completion-card');if(!panel)return;clearDrinkLayer();const panelRect=panel.getBoundingClientRect(),targetRect=actionNode.getBoundingClientRect(),host=document.createElement('div');host.innerHTML=panel.outerHTML;underlay=host.firstElementChild;if(!underlay)return;underlay.classList.add('completion-parent-underlay');underlay.removeAttribute('data-pointer-side');underlay.querySelectorAll('[data-action]').forEach(node=>{node.removeAttribute('data-action');node.setAttribute('tabindex','-1');node.setAttribute('aria-hidden','true')});Object.assign(underlay.style,{left:panelRect.left+'px',top:panelRect.top+'px',width:panelRect.width+'px',height:panelRect.height+'px',right:'auto',bottom:'auto'});underlay.scrollTop=panel.scrollTop;document.body.appendChild(underlay);sourceRect={left:targetRect.left,top:targetRect.top,right:targetRect.right,bottom:targetRect.bottom,width:targetRect.width,height:targetRect.height,cx:targetRect.left+targetRect.width/2,cy:targetRect.top+targetRect.height/2};openingDrink=true;setTimeout(()=>{openingDrink=false;syncDrinkPopover()},220)}
        function positionDrinkPopover(popover){if(!popover||!sourceRect)return;const margin=10,gap=9,vw=innerWidth,vh=innerHeight,width=popover.offsetWidth||164,height=popover.offsetHeight||120;let left=sourceRect.right+gap,top=sourceRect.cy-height/2,side='left';if(left+width>vw-margin){left=sourceRect.left-width-gap;side='right'}if(left<margin){left=Math.min(vw-width-margin,Math.max(margin,sourceRect.cx-width/2));top=sourceRect.bottom+gap;side='top'}if(top+height>vh-margin){top=sourceRect.top-height-gap;side='bottom'}left=Math.max(margin,Math.min(left,vw-width-margin));top=Math.max(margin,Math.min(top,vh-height-margin));popover.dataset.pointerSide=side;popover.style.left=left+'px';popover.style.top=top+'px';popover.style.right='auto';popover.style.bottom='auto';popover.style.transform='none';popover.style.setProperty('--pointer-x',Math.max(12,Math.min(width-12,sourceRect.cx-left))+'px');popover.style.setProperty('--pointer-y',Math.max(12,Math.min(height-12,sourceRect.cy-top))+'px')}
        function syncDrinkPopover(){const popover=app.querySelector('.modifier-card.is-anchored-popover,.modifier-card');if(popover&&sourceRect){positionDrinkPopover(popover);return}if(!openingDrink&&underlay)clearDrinkLayer()}
        app.addEventListener('scroll',event=>{const target=event.target;if(target.matches?.('.products'))view.productsTop=target.scrollTop;else if(target.matches?.('.category-scroll'))view.categoryLeft=target.scrollLeft;else if(target.matches?.('.cart-list'))view.cartTop=target.scrollTop},true);
        app.addEventListener('pointerdown',event=>{const actionNode=event.target.closest('[data-action]'),statusNode=event.target.closest('button,[role="button"],span,div'),statusText=statusNode?.textContent?.trim()||'';if(!actionNode&&/^(接單中|已停止接單|接單至)/.test(statusText)){statusNode.dataset.action='open-status';statusNode.setAttribute('role','button');statusNode.setAttribute('aria-label','開啟接單設定')}if(actionNode?.dataset.action==='completion-drink')captureDrinkLayer(actionNode);if(actionNode?.dataset.action==='dismiss-modal'||actionNode?.dataset.action==='completion-close')clearDrinkLayer();remember();const action=(actionNode||statusNode)?.dataset.action||'';restore({resetProducts:action==='category'});setTimeout(()=>requestAnimationFrame(syncDrinkPopover),0)},true);
        app.addEventListener('keydown',event=>{if(event.key!=='Enter'&&event.key!==' ')return;const statusNode=event.target.closest('[role="button"]');if(!statusNode)return;const statusText=statusNode.textContent?.trim()||'';if(/^(接單中|已停止接單|接單至)/.test(statusText))statusNode.dataset.action='open-status'},true);
        const modalObserver=new MutationObserver(()=>requestAnimationFrame(syncDrinkPopover));modalObserver.observe(app,{childList:true,subtree:false});
      })();
    </script>
