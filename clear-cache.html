<!doctype html><html lang="zh-HK"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>磨飯 SMT 快取重設</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;display:grid;place-items:center;min-height:100vh;margin:0;background:#241d27;color:#fff}.box{text-align:center;padding:32px}.box b{font-size:24px}.box p{opacity:.75}</style></head><body><div class="box"><b>正在更新 SMT 文件</b><p id="status">清除舊快取並重新載入…</p></div><script>(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.filter(k=>k.startsWith('morefun-smt')).map(k=>caches.delete(k)));}document.getElementById('status').textContent='完成，正在開啟 T2 V1.0.1';setTimeout(()=>location.replace('./?build=T2-1.0.1-20260719'),500);}catch(e){document.getElementById('status').textContent='清除失敗，請關閉頁面後重開：'+e.message;}})();</script></body></html>
