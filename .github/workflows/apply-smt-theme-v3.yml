name: Apply SMT seven-day theme v3

on:
  push:
    branches:
      - feat/smt-seven-day-theme-v3
    paths:
      - .upload/theme-v3-patch.b64

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/smt-seven-day-theme-v3
          fetch-depth: 0

      - name: Apply verified patch
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .upload/theme-v3-patch.b64 > /tmp/theme-v3-patch.zip
          unzip -o /tmp/theme-v3-patch.zip
          npm test
          node --check app.js
          node --check smt-state.js
          node --check smt-icons.js
          node --check smt-views.js
          node --check smt-themes.js
          rm -f .upload/theme-v3-patch.b64
          rm -f .github/workflows/apply-smt-theme-v3.yml
          rmdir .upload 2>/dev/null || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: add seven-day themes and restrained contrast"
          git push origin HEAD:feat/smt-seven-day-theme-v3
