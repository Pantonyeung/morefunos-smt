name: SMT Slice 1 CI

on:
  push:
    branches:
      - feat/smt-intuitive-ui-slice-1
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Capture automated test output
        id: tests
        shell: bash
        run: |
          set +e
          npm test > test-output.txt 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload automated test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smt-test-output
          path: test-output.txt
          if-no-files-found: error
          retention-days: 3

      - name: Enforce automated test result
        shell: bash
        run: |
          cat test-output.txt
          test "${{ steps.tests.outputs.exit_code }}" = "0"

      - name: Check runtime JavaScript syntax
        run: |
          for file in \
            app.js \
            smt-data.js \
            smt-copy.js \
            smt-domain.js \
            smt-state.js \
            smt-icons.js \
            smt-motion.js \
            smt-views.js \
            service-worker.js
          do
            node --check "$file"
          done

      - name: Check Android QA script syntax
        run: bash -n android-qa/run-sunmi-t2s-qa.sh

      - name: Block client-side OpenAI secrets
        run: |
          if grep -RInE 'OPENAI_API_KEY|api\.openai\.com|sk-proj-' \
            --include='*.js' --include='*.html' --include='*.css' .; then
            echo '收銀 Runtime 不得包含 OpenAI API key 或客戶端 API 呼叫。'
            exit 1
          fi
