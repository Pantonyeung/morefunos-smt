name: Apply SMT Slice 1 payload

on:
  push:
    branches:
      - feat/smt-intuitive-ui-slice-1
    paths:
      - '.smt-slice1/**'
      - '.github/workflows/apply-smt-slice1.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Rebuild and verify payload
        shell: bash
        run: |
          set -euo pipefail
          cat .smt-slice1/chunk-* | base64 --decode > /tmp/smt-slice1-runtime.tar.gz
          echo '2c45690f62c37133a5d7d6aa5e977d89596afaf3c732a38c5b0b4cee3cce1bf3  /tmp/smt-slice1-runtime.tar.gz' | sha256sum --check --strict
          tar -tzf /tmp/smt-slice1-runtime.tar.gz

      - name: Apply runtime files and remove temporary payload
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/smt-slice1-runtime.tar.gz -C .
          rm -rf .smt-slice1
          rm -f .github/workflows/apply-smt-slice1.yml

      - name: Run verification
        shell: bash
        run: |
          set -euo pipefail
          npm test
          node --check app.js
          node --check smt-data.js
          node --check smt-copy.js
          node --check smt-domain.js
          node --check smt-state.js
          node --check smt-icons.js
          node --check smt-motion.js
          node --check smt-views.js

      - name: Commit clean implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m 'feat: implement intuitive Traditional Chinese SMT slice 1'
          git push origin HEAD:${{ github.ref_name }}
