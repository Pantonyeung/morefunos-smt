name: Finalize SMT web upload

on:
  push:
    paths:
      - '.github/workflows/finalize-smt-upload.yml'
      - '.upload/**'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode payload and keep webpage text files only
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64, gzip, io, json, shutil, tarfile, tempfile, zipfile

          repo = Path.cwd()
          parts = sorted((repo / '.upload').glob('part-*.txt'))
          if not parts:
              raise SystemExit('No upload payload parts found')

          encoded = ''.join(p.read_text(encoding='utf-8').strip() for p in parts)
          raw = base64.b64decode(encoded)
          try:
              data = gzip.decompress(raw)
          except OSError:
              data = raw

          work = Path(tempfile.mkdtemp(prefix='smt-upload-'))

          def safe_target(root: Path, name: str) -> Path:
              target = (root / name).resolve()
              if root.resolve() not in target.parents and target != root.resolve():
                  raise ValueError(f'Unsafe archive path: {name}')
              return target

          extracted = False
          try:
              with tarfile.open(fileobj=io.BytesIO(data), mode='r:*') as tf:
                  for member in tf.getmembers():
                      safe_target(work, member.name)
                  tf.extractall(work)
                  extracted = True
          except tarfile.TarError:
              pass

          if not extracted and zipfile.is_zipfile(io.BytesIO(data)):
              with zipfile.ZipFile(io.BytesIO(data)) as zf:
                  for name in zf.namelist():
                      safe_target(work, name)
                  zf.extractall(work)
                  extracted = True

          if not extracted:
              try:
                  obj = json.loads(data.decode('utf-8'))
              except Exception as exc:
                  raise SystemExit(f'Unsupported payload format: {exc}')
              files = obj.get('files', obj) if isinstance(obj, dict) else None
              if not isinstance(files, dict):
                  raise SystemExit('JSON payload does not contain a file map')
              for name, value in files.items():
                  target = safe_target(work, name)
                  target.parent.mkdir(parents=True, exist_ok=True)
                  if isinstance(value, dict) and value.get('encoding') == 'base64':
                      target.write_bytes(base64.b64decode(value['content']))
                  else:
                      content = value.get('content', '') if isinstance(value, dict) else value
                      target.write_text(str(content), encoding='utf-8')

          required = ['app.js', 'index.html', 'manifest.webmanifest', 'README.md', 'service-worker.js', 'styles.css']
          for filename in required:
              candidates = [p for p in work.rglob(filename) if p.is_file()]
              if not candidates:
                  raise SystemExit(f'Missing required file in payload: {filename}')
              candidates.sort(key=lambda p: (0 if 'smt-web-locked' in p.parts else 1, len(p.parts)))
              shutil.copy2(candidates[0], repo / filename)

          # Explicitly ensure no image asset is committed.
          image_exts = {'.png', '.jpg', '.jpeg', '.gif', '.webp', '.svg', '.avif', '.ico'}
          for path in list(repo.rglob('*')):
              if path.is_file() and path.suffix.lower() in image_exts and '.git' not in path.parts:
                  path.unlink()

          shutil.rmtree(repo / '.upload', ignore_errors=True)
          Path('.github/workflows/finalize-smt-upload.yml').unlink(missing_ok=True)
          PY

      - name: Validate website files
        shell: bash
        run: |
          test -s index.html
          test -s app.js
          test -s styles.css
          test -s manifest.webmanifest
          test -s service-worker.js
          test -s README.md
          if find . -path './.git' -prune -o -type f \( -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.gif' -o -iname '*.webp' -o -iname '*.svg' -o -iname '*.avif' -o -iname '*.ico' \) -print | grep -q .; then
            echo 'Image file found after filtering'
            exit 1
          fi

      - name: Commit finalized website
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Finalize SMT web core without images'
          git push
